name: "Suggest Improvement"
description: "Use this template to suggest improvements to explanations, examples, structure..."
labels: ["improvement"]
title: "[Suggestion] <Short description of your idea>"
body:
  - type: markdown
    attributes:
      value: |
        Make a suggestion for something that is not broken but could still be improved.

  - type: textarea
    id: current_state
    attributes:
      label: What could be improved?
      description: "Describe what part feels unclear, incomplete, or could be better."
      placeholder: "The explanation of pointers feels too short..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Do you have a suggestion on how to improve it?
      description: "You can suggest rewording, adding an example, restructuring content, etc."
      placeholder: "Adding a diagram would help because..."
    validations:
      required: false
